                "Черновая отделка": ["Бетоноконтакт (м2)", "Стяжка (м2)", "Сетка ВР4 15*15 (м2)", "Штукатурка стен (м2)", "Grender гипсовая (м2)"],
                "Чистовая отделка": [ "Глат шпатлевка (м2)", "Финишная шпатлевка (м2)", "Покраска (м2)", "Кафель (м2)"]
            }
        };

        const floorSel = document.getElementById('floor');
        const floors = ["-2", "-1", "Крыша"];
        for(let i=1; i<=24; i++) floors.push(i.toString());
        floors.forEach(f => {
            let o = document.createElement('option'); o.value = o.textContent = f; floorSel.appendChild(o);
        });

        function updateCategories() {
            const sys = document.getElementById('system').value;
            const catSel = document.getElementById('category');
            catSel.innerHTML = '<option value="">-- Выберите --</option>';
            for (let cat in allData[sys]) {
                let o = document.createElement('option'); o.value = o.textContent = cat; catSel.appendChild(o);
            }
            updateWorks();
        }

        function updateWorks() {
            const sys = document.getElementById('system').value;
            const cat = document.getElementById('category').value;
            const workSel = document.getElementById('work');
            workSel.innerHTML = '';
            if (allData[sys][cat]) {
                allData[sys][cat].forEach(w => {
                    let o = document.createElement('option'); o.value = o.textContent = w; workSel.appendChild(o);
                });
            }
        }

        let reportRows = [];
        function addRow() {
            const vol = document.getElementById('volume').value;
            if(!vol || vol <= 0) return alert("Введите объем!");

            reportRows.push({
                date: document.getElementById('date').value,
                sys: document.getElementById('system').value,
                block: document.getElementById('block').value,
                floor: document.getElementById('floor').value,
                cat: document.getElementById('category').value,
                work: document.getElementById('work').value,
                vol: vol
            });
            render();
            document.getElementById('volume').value = '';
        }

        function deleteRow(index) {
            reportRows.splice(index, 1);
            render();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            reportRows.forEach((r, i) => {
                const d = r.date.split('-').reverse().join('.');
                list.innerHTML += `
                    <div class="item">
                        <span>${i+1}. ${d} | ${r.sys} | эт.${r.floor} | ${r.work} — <b>${r.vol}</b></span>
                        <button class="del-btn" onclick="deleteRow(${i})">❌</button>
                    </div>`;
            });
            document.getElementById('summary').style.display = reportRows.length > 0 ? 'block' : 'none';
        }

        function sendData() {
            if (reportRows.length === 0) return;
            tg.sendData(JSON.stringify(reportRows));
            tg.close();
        }

        updateCategories();
    </script>
</body>
</html>
