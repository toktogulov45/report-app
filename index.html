<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГИК: Полный отчет (Эм, Мех, Стр)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 12px; color: #666; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: #fff; }
        button { width: 100%; padding: 15px; background-color: #0088cc; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .summary-card { border-top: 4px solid #28a745; display: none; }
        .item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; line-height: 1.3; }
        .del-btn { width: auto; padding: 6px 10px; background-color: #ff4d4d; font-size: 12px; margin-left: 10px; flex-shrink: 0; border-radius: 5px; }
        h3 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Новая запись</h3>
        
        <label>📅 Дата:</label>
        <input type="date" id="date">

        <label>⚙️ Система:</label>
        <select id="system" onchange="updateCategories()">
            <option value="Стр">Стр (Общестрой)</option>
            <option value="Эм">Эм (Электрика)</option>
            <option value="Мех">Мех (Сантехника/Отопление)</option>
        </select>

        <label>🏗 Блок:</label>
        <select id="block">
            <option value="Блок 17">Блок 17</option>
            <option value="Блок 18">Блок 18</option>
            <option value="Блок 22">Блок 22</option>
            <option value="Блок 23">Блок 23</option>
            <option value="Блок 24">Блок 24</option>
            <option value="Блок 25">Блок 25</option>
            <option value="Блок 26">Блок 26</option>
            <option value="Блок 27">Блок 27</option>
            <option value="Блок 28">Блок 28</option>
            <option value="Блок 29">Блок 29</option>
        </select>

        <label>📍 Этаж:</label>
        <select id="floor"></select>

        <label>📁 Категория:</label>
        <select id="category" onchange="updateWorks()">
            <option value="">-- Выберите --</option>
        </select>

        <label>🛠 Работа:</label>
        <select id="work"></select>

        <label>🔢 Объем:</label>
        <input type="number" id="volume" placeholder="0.00" step="0.01">
        
        <button onclick="addRow()">➕ Добавить в отчет</button>
    </div>

    <div class="card summary-card" id="summary">
        <h3>Итоговый список:</h3>
        <div id="list"></div>
        <button style="background-color: #28a745; margin-top: 15px;" onclick="sendData()">✅ Отправить в ГИК</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('date').valueAsDate = new Date();

        const allData = {
            "Стр": {
                "Кладка": ["Газоблок 600*300*200 (шт/м3)", "Сетка ВР 4 (15см) (м)", "Газоблок 600*300*100 (шт/м3)", "Сетка ВР 4 (10см) (м)", "Арматура 6мм (м)", "Сетка металл 10*10мм (м2)"],
                "Усиление стен": ["Уголок 50*50*5 (м)", "Уголок 40*40*4 (м)", "Полоса 40*3мм (м)", "Арматура 10мм (м)"],
                "Штукатурка": ["Бетоноконтакт (кг/м2)", "Сетка ВР4 15*15 (м2)", "Штукатурка стен (м2)", "Grender гипсовая (м2)", "Глат шпатлевка (м2)", "Финишная шпатлевка (м2)", "Покраска (м2)"]
            },
            "Эм": {
                "Авт. выкл.": ["Установка авт. выкл. (габарит 100) 100 250А (шт)", "Установка авт. выкл. (габарит 100) 40 80А (шт)", "Установка авт. выкл. 25 80А (шт)", "Установка авт. выкл. однополюсных 10 63А (шт)"],
                "Кабель Ал-й": ["Кабель алюминиевый 3х185+1х120 АВВГ (м)", "Кабель алюминиевый 3х70+1х35 АВВГ (м)", "Кабель алюминиевый 5x70 АВВГ (м)", "Кабель алюминиевый 5x95 АВВГ (м)", "Кабель алюминиевый 3х95+1х50 АВВГ (м)", "Кабель алюминиевый 1х120 АПВ (м)", "Кабель алюминиевый 1х35 АПВ (м)", "Кабель алюминиевый 3х240+1х120 АВВГ (м)", "Кабель алюминиевый 3х150+1х95 АВВГ (м)", "Кабель алюминиевый 5x120 АВВГ (м)"],
                "Кабель Медь": ["Кабель медный 3х1,5 ВВГнг ls (м)", "Кабель медный 3х2,5 ВВГнг ls (м)", "Кабель медный 3х4 (м)", "Кабель медный 1х6 ПВ3 (м)", "Кабель медный 1x16 ПВ3 (м)", "Кабель медный 3х10 ВВГнг ls (м)", "Кабель медный 3х16 ВВГнг ls (м)", "Кабель медный 5х16 ВВГнг ls (м)", "Кабель медный 5х1,5 ВВГнг ls (м)", "Кабель медный 5х10 ВВГнг ls (м)", "Кабель медный 5х25 ВВГнг ls (м)", "Кабель медный 5х4 ВВГнг ls (м)", "Кабель медный 5х6 ВВГнг ls (м)", "Кабель медный 2х0,75 ТРП (м)"],
                "Лотки": ["Монтаж лотков 300x50x0,7 (м)", "Монтаж лотков 200x50x0,7 (м)", "Монтаж лотков 100x50x0,7 (м)"],
                "Монт изделия": ["Наконечники 120-240мм2 (шт)", "Наконечники 16-95 мм2 (шт)", "Сжим (орех) 120-240мм2 (шт)", "Сжим (орех) 16-95мм2 (шт)", "Коробка ответвительная (шт)", "Подрозетник (шт)"],
                "Щиты/Освещение": ["ЩК Квартирный (Уст/Сбор) (шт)", "ЩЭ Этажный (Уст/Сбор) (шт)", "ВРУ 1 (Уст/Сбор) (шт)", "Светильник LED 18/36Вт (шт)", "Выключатель/Розетка (шт)"],
                "Трубы/Прочее": ["Гофра Ф16/20/25/32 ПВХ (м)", "ПВД 20/25/32/50/63 (м)", "Металлорукав 19мм (м)", "Сталь полоса/угол (м)"]
            },
            "Мех": {
                "Подг. работы": ["Штробление стен (м)", "Отверстия до 108 мм (шт)", "Штробление стяжки 50х50мм (м)"],
                "ППР/Трубы": ["Труба Ø20/25/32 (м)", "Муфты/отводы/тройники ППР (шт)", "Вентиль ППР Ø20/25 (шт)"],
                "Радиатор": ["Установка радиаторов (шт)", "Угловые краны радиатора (шт)", "Терморегулятор (шт)"],
                "Трубы сталь": ["Труба Ø15-Ø159 (все диаметры) (м)", "Покраска труб (м)"],
                "Отводы сталь": ["Отвод кованый Ø15-Ø159 (шт)"],
                "Фитинги/Арматура": ["Кран шаровый 15 (шт)", "Кран приварной Ду 20-50 (шт)", "Заглушки латунные (шт)", "Фланцы/Переходы (шт)"],
                "Изоляция": ["Изоляция пластик/вспененная (м)"],
                "ПВХ/Фаянс": ["Труба ПВХ д150/100/50 (м)", "Установка унитаза/умывальника/ванны (шт)", "Смеситель/Сифон (шт)"],
                "Оборудование": ["Счетчик д15/Теплосчетчик (шт)", "Насос Sololift/Гном (шт)", "Водомерный узел (шт)"]
            }
        };

        const fS = document.getElementById('floor');
        const fls = ["-2", "-1", "Крыша"];
        for(let i=1; i<=24; i++) fls.push(i.toString());
        fls.forEach(f => {
            let o = document.createElement('option');
            o.value = o.textContent = f;
            fS.appendChild(o);
        });

        function updateCategories() {
            const s = document.getElementById('system').value;
            const cS = document.getElementById('category');
            cS.innerHTML = '<option value="">-- Выберите --</option>';
            for (let c in allData[s]) {
                let o = document.createElement('option');
                o.value = o.textContent = c;
                cS.appendChild(o);
            }
            updateWorks();
        }

        function updateWorks() {
            const s = document.getElementById('system').value;
            const c = document.getElementById('category').value;
            const wS = document.getElementById('work');
            wS.innerHTML = '';
            if (allData[s][c]) {
                allData[s][c].forEach(w => {
                    let o = document.createElement('option');
                    o.value = o.textContent = w;
                    wS.appendChild(o);
                });
            }
        }

        let rRows = [];
        function addRow() {
            const v = document.getElementById('volume').value;
            if(!v || v <= 0) return alert("Введите объем!");
            rRows.push({
                date: document.getElementById('date').value,
                sys: document.getElementById('system').value,
                block: document.getElementById('block').value,
                floor: document.getElementById('floor').value,
                cat: document.getElementById('category').value,
                work: document.getElementById('work').value,
                vol: v
            });
            render();
            document.getElementById('volume').value = '';
        }

        function deleteRow(i) { rRows.splice(i, 1); render(); }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            rRows.forEach((r, i) => {
                const d = r.date.split('-').reverse().join('.');
                list.innerHTML += `
                    <div class="item">
                        <span>${i+1}. ${d} | ${r.sys} | эт.${r.floor} | ${r.work} — <b>${r.vol}</b></span>
                        <button class="del-btn" onclick="deleteRow(${i})">❌</button>
                    </div>`;
            });
            document.getElementById('summary').style.display = rRows.length > 0 ? 'block' : 'none';
        }

        function sendData() {
            if (rRows.length === 0) return;
            tg.sendData(JSON.stringify(rRows));
            tg.close();
        }

        updateCategories();
    </script>
</body>
</html>
