<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приемка по накладной</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            padding: 15px; margin: 0; padding-bottom: 30px;
        }
        .header-block, .item-block {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 15px; border-radius: 10px; margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }
        h2 { margin-top: 0; font-size: 18px; color: var(--tg-theme-text-color, #333); border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        h3 { margin-top: 0; font-size: 15px; color: var(--tg-theme-hint-color, #666); }
        label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; color: var(--tg-theme-text-color, #555);}
        
        input, select {
            width: 100%; box-sizing: border-box; padding: 12px 10px; margin-top: 5px;
            border: 1px solid var(--tg-theme-hint-color, #ccc); border-radius: 5px;
            background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); font-size: 15px;
            /* Убираем стандартные тени iOS */
            -webkit-appearance: none; appearance: none;
        }
        
        /* Жесткая нерушимая сетка 50/50 для цены и количества */
        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .add-btn {
            width: 100%; padding: 14px; margin-bottom: 30px;
            background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        .remove-btn {
            position: absolute; top: 15px; right: 15px;
            background: #ff3b30; color: white; border: none;
            border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header-block">
        <h2>📄 Данные накладной</h2>
        
        <label>Дата</label>
        <input type="date" id="inv-date" required>
        
        <label>№ Накладной</label>
        <input type="text" id="inv-num" inputmode="text" placeholder="Например: 125-А" required>

        <label>Поставщик / Водитель</label>
        <input type="text" id="inv-supplier" placeholder="ОсОО СтройМир / Газель 123" required>
    </div>

    <h2 style="margin-top: 20px;">📦 Список материалов</h2>
    <div id="items-container"></div>

    <button class="add-btn" onclick="addItem()">+ Добавить позицию</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('inv-date').value = new Date().toISOString().split('T')[0];

        const container = document.getElementById('items-container');
        let itemCount = 0;

        function addItem() {
            itemCount++;
            const blockId = `item-${itemCount}`;
            const div = document.createElement('div');
            div.className = 'item-block';
            div.id = blockId;

            div.innerHTML = `
                ${itemCount > 1 ? `<button class="remove-btn" onclick="removeItem('${blockId}')">Удалить</button>` : ''}
                <h3>Позиция #${itemCount}</h3>

                <label>Наименование материала</label>
                <input type="text" class="i-name" placeholder="Например: Цемент М500" required>

                <div class="grid-2">
                    <div>
                        <label>Цена (за ед.)</label>
                        <input type="number" class="i-price" step="0.01" inputmode="decimal" placeholder="0.00" required>
                    </div>
                    <div>
                        <label>Кол-во</label>
                        <input type="number" class="i-qty" step="0.01" inputmode="decimal" placeholder="0" required>
                    </div>
                </div>
                
                <label>Ед. изм.</label>
                <select class="i-unit">
                    <option value="шт">шт</option>
                    <option value="кг">кг</option>
                    <option value="тн">тн</option>
                    <option value="м3">м³</option>
                    <option value="м.п.">м.п.</option>
                    <option value="меш">меш</option>
                    <option value="л">литр</option>
                </select>
            `;
            container.appendChild(div);
        }

        function removeItem(id) {
            document.getElementById(id)?.remove();
        }

        addItem();

        tg.MainButton.text = "ОТПРАВИТЬ НАКЛАДНУЮ";
        tg.MainButton.show();

        tg.MainButton.onClick(() => {
            const invDateRaw = document.getElementById('inv-date').value;
            const invNum = document.getElementById('inv-num').value.trim();
            const invSupplier = document.getElementById('inv-supplier').value.trim();

            if (!invNum || !invSupplier) {
                tg.showAlert("Заполните номер накладной и поставщика!");
                return;
            }

            const formattedDate = invDateRaw.split('-').reverse().join('.');
            let items = [];
            let isValid = true;

            document.querySelectorAll('.item-block').forEach(block => {
                const name = block.querySelector('.i-name').value.trim();
                const price = block.querySelector('.i-price').value;
                const qty = block.querySelector('.i-qty').value;
                const unit = block.querySelector('.i-unit').value;

                if(!name || !price || !qty) isValid = false;

                items.push({
                    name: name,
                    price: parseFloat(price) || 0,
                    qty: parseFloat(qty) || 0,
                    unit: unit
                });
            });

            if (!isValid) {
                tg.showAlert("Пожалуйста, заполните Наименование, Цену и Количество для всех позиций!");
                return;
            }

            const dataToSend = JSON.stringify({
                invoice_date: formattedDate,
                invoice_number: invNum,
                supplier: invSupplier,
                items: items
            });
            
            tg.sendData(dataToSend);
        });
    </script>
</body>
</html>
